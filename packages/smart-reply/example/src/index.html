<!doctype html>
<html lang="en" dir="ltr" class="hydrated">
  <head>
    <meta charset="UTF-8" />
    <title>Smart Reply Example</title>
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="format-detection" content="telephone=no" />
  </head>
  <body>
    <main>
      <h1>ML Kit Smart Reply</h1>
      <p>
        Generates reply suggestions for the following (English) conversation:
      </p>
      <ul>
        <li>Remote: Are you free for lunch today?</li>
        <li>Local: Sure, where do you want to go?</li>
        <li>Remote: How about the new place downtown?</li>
      </ul>
      <button onclick="suggestReplies()">Suggest Replies</button>
      <pre id="output"></pre>
    </main>

    <script src="./js/script.js" type="module"></script>
  </body>
</html>
