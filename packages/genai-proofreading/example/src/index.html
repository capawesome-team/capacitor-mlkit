<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <title>ML Kit GenAI Proofreading</title>
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />

    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"
    ></script>
    <script
      nomodule
      src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.js"
    ></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css"
    />

    <script type="module" src="./js/script.js"></script>
  </head>
  <body>
    <ion-app>
      <ion-header>
        <ion-toolbar>
          <ion-title>ML Kit GenAI Proofreading</ion-title>
        </ion-toolbar>
      </ion-header>
      <ion-content class="ion-padding">
        <ion-item>
          <ion-select id="inputType" label="Input Type" interface="popover">
            <ion-select-option value="KEYBOARD">Keyboard</ion-select-option>
            <ion-select-option value="VOICE">Voice</ion-select-option>
          </ion-select>
        </ion-item>
        <ion-item>
          <ion-select id="language" label="Language" interface="popover">
            <ion-select-option value="ENGLISH">English</ion-select-option>
            <ion-select-option value="FRENCH">French</ion-select-option>
            <ion-select-option value="GERMAN">German</ion-select-option>
            <ion-select-option value="ITALIAN">Italian</ion-select-option>
            <ion-select-option value="JAPANESE">Japanese</ion-select-option>
            <ion-select-option value="KOREAN">Korean</ion-select-option>
            <ion-select-option value="SPANISH">Spanish</ion-select-option>
          </ion-select>
        </ion-item>
        <ion-item>
          <ion-textarea
            id="text"
            label="Text"
            label-placement="stacked"
            auto-grow="true"
            rows="4"
            value="Capacitor is an open source natvie runtime for buildng Web Native aps."
          ></ion-textarea>
        </ion-item>
        <ion-button id="check-feature-status" expand="block"
          >Check Feature Status</ion-button
        >
        <ion-button id="download-feature" expand="block"
          >Download Feature</ion-button
        >
        <ion-button id="proofread" expand="block">Proofread</ion-button>
        <ion-item>
          <ion-label id="result" class="ion-text-wrap">Result: -</ion-label>
        </ion-item>
      </ion-content>
    </ion-app>
  </body>
</html>
